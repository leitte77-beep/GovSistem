x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doe}
      POSTGRES_USER: ${POSTGRES_USER:-doe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doe_password}
    ports:
      - "15433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-doe_user} -d ${POSTGRES_DB:-doe}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - doe-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doe-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - doe-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    logging: *default-logging
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-minio_password}
        mc mb myminio/${MINIO_BUCKET:-doe-publicacoes} --with-lock --ignore-existing
        mc anonymous set download myminio/${MINIO_BUCKET:-doe-publicacoes}
        echo "MinIO bucket initialized"
        exit 0
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - doe-network

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-doe}
      POSTGRES_USER: ${POSTGRES_USER:-doe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doe_password}
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-doe-publicacoes}
      MINIO_SECURE: "false"
      SIGNER_URL: http://signer:8100
      CORS_ORIGINS: '["http://localhost:7201","http://localhost:7200"]'
      DEBUG: ${API_DEBUG:-true}
      SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-123}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - doe-network
    restart: unless-stopped

  worker:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-doe}
      POSTGRES_USER: ${POSTGRES_USER:-doe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doe_password}
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-doe-publicacoes}
      MINIO_SECURE: "false"
      SIGNER_URL: http://signer:8100
      API_URL: http://api:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-123}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - doe-network
    restart: unless-stopped

  beat:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-doe}
      POSTGRES_USER: ${POSTGRES_USER:-doe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doe_password}
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-doe-publicacoes}
      MINIO_SECURE: "false"
      SIGNER_URL: http://signer:8100
      API_URL: http://api:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-123}
    command: celery -A app.worker beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - doe-network
    restart: unless-stopped

  signer:
    build:
      context: ../apps/signer
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      SIGNER_PROVIDER: ${SIGNER_PROVIDER:-a1}
      SIGNER_A1_PFX_PATH: ${SIGNER_A1_PFX_PATH:-/certs/cert.pfx}
      SIGNER_A1_PASSWORD: ${SIGNER_A1_PASSWORD:-}
    ports:
      - "8110:8100"
    volumes:
      - ${SIGNER_CERTS_DIR:-./certs}:/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - doe-network
    restart: unless-stopped

  web-admin:
    build:
      context: ../apps/web-admin
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    ports:
      - "7201:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - doe-network
    restart: unless-stopped

  web-public:
    build:
      context: ../apps/web-public
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:7201}
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
      NEXT_PUBLIC_ADMIN_URL: http://localhost:7201
    ports:
      - "7200:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - doe-network
    restart: unless-stopped

networks:
  doe-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
  api_uploads:
    driver: local
