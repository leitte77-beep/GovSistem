# HTTP → HTTPS redirect
server {
    listen 80;
    server_name govsistem.com.br *.govsistem.com.br farol.govsistem.com.br admin.govsistem.com.br api.govsistem.com.br diario.govsistem.com.br doe-admin.govsistem.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API
server {
    listen 443 ssl http2;
    server_name api.govsistem.com.br;

    ssl_certificate /etc/nginx/ssl/live/govsistem-farol/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/govsistem-farol/privkey.pem;

    location /api/v1/health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /metrics {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# SaaS Platform Admin
server {
    listen 443 ssl http2;
    server_name admin.govsistem.com.br;

    ssl_certificate /etc/nginx/ssl/live/govsistem-farol/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/govsistem-farol/privkey.pem;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://lh3.googleusercontent.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:9009 https://api.govsistem.com.br; frame-ancestors 'none'; form-action 'self';";

    location /_next/static {
        proxy_pass http://host.docker.internal:9002;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://host.docker.internal:9002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

