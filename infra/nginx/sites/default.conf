# Diário Oficial — public tenant portals and SSO module entry
server {
    listen 443 ssl http2;
    server_name diario.govsistem.com.br;

    ssl_certificate /etc/nginx/ssl/live/govsistem-farol/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/govsistem-farol/privkey.pem;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.qrserver.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://api.qrserver.com https://lh3.googleusercontent.com https://api.govsistem.com.br; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.govsistem.com.br; frame-src 'self' https://diario.govsistem.com.br; frame-ancestors 'self' https://api.qrserver.com; form-action 'self';";

    location ^~ /api/download/ {
        alias /app/uploads/;
        add_header Content-Disposition "inline";
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options "";
        add_header Referrer-Policy strict-origin-when-cross-origin;
        add_header Content-Security-Policy "frame-ancestors *";
        error_page 404 = @fallback-download;
    }

    location @fallback-download {
        proxy_pass http://web-public:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /_next/static {
        proxy_pass http://web-public:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location ~ "^/([a-z0-9][a-z0-9-]{1,62})(/_next/static/.*)$" {
        rewrite ^/[^/]+(/_next/static/.*)$ $1 break;
        proxy_pass http://web-public:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location ~ "^/([a-z0-9][a-z0-9-]{1,62})(/.*)?$" {
        proxy_pass http://web-public:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Slug $1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web-public:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
