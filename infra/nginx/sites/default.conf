# ChatGov Admin (SaaS module)
server {
    listen 443 ssl http2;
    server_name chatgov.govsistem.com.br;

    ssl_certificate /etc/nginx/ssl/live/govsistem-farol/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/govsistem-farol/privkey.pem;

    # WhatsApp media e uploads grandes
    client_max_body_size 50m;

    # Cache: assets imutaveis (hash no nome), HTML nunca cache
    location /assets/ {
        proxy_pass http://host.docker.internal:3051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        limit_req zone=chatgov burst=100 nodelay;
        proxy_pass http://host.docker.internal:3050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /socket.io/ {
        proxy_pass http://host.docker.internal:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /media/ {
        proxy_pass http://host.docker.internal:3050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://host.docker.internal:3051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}

