x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modulo_diario}
      POSTGRES_USER: ${POSTGRES_USER:-diario_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diario_password}
    # Development only - remove in production
    ports:
      - "9632:5432"
    volumes:
      - modulo_diario_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diario_user} -d ${POSTGRES_DB:-modulo_diario}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - diario-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    # Development only - remove in production
    ports:
      - "9579:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diario-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    # Development only - remove in production
    ports:
      - "9990:9000"
      - "9991:9001"
    volumes:
      - modulo_diario_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - diario-network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      APP_NAME: "Modulo Diario API"
      DEBUG: ${DEBUG:-false}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-modulo_diario}
      POSTGRES_USER: ${POSTGRES_USER:-diario_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diario_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-doe-publicacoes}
      MINIO_SECURE: "false"
      SIGNER_URL: http://signer:8100
      SECRET_KEY: ${SECRET_KEY:-change-me-in-dev}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-dev}
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:-}
      SAAS_INTERNAL_API_KEY: ${SAAS_INTERNAL_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:9202","http://localhost:9200","https://farol.govsistem.com.br"]'
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "9201:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - diario-network
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-modulo_diario}
      POSTGRES_USER: ${POSTGRES_USER:-diario_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diario_password}
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-doe-publicacoes}
      SIGNER_URL: http://signer:8100
      API_URL: http://api:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
    command: celery -A app.worker worker --loglevel=info --concurrency=4 --beat
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - diario-network
    restart: unless-stopped

  signer:
    build:
      context: ./signer
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      SIGNER_PROVIDER: ${SIGNER_PROVIDER:-a1}
      VERIFICATION_BASE_URL: https://govsistem.com.br/verificar
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-dev}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - diario-network
    restart: unless-stopped

  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://doe-admin.govsistem.com.br/api/v1
        NEXT_PUBLIC_ADMIN_URL: https://doe-admin.govsistem.com.br
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: https://doe-admin.govsistem.com.br/api/v1
      NEXT_PUBLIC_ADMIN_URL: https://doe-admin.govsistem.com.br
    ports:
      - "9202:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - diario-network
    restart: unless-stopped

  web-public:
    build:
      context: ./web-public
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:9202}
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9201/api/v1}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:9202}
    ports:
      - "9200:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - diario-network
    restart: unless-stopped

networks:
  diario-network:
    driver: bridge

volumes:
  modulo_diario_pgdata:
    driver: local
  modulo_diario_miniodata:
    driver: local
