# nginx interno do container: serve a SPA estática do GovSocial.
# O roteamento de /api/govsocial e TLS é feito pelo nginx da infra (borda).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash no nome: cache longo e imutável.
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota cai no index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
