<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Lista de Presença</title>
<style>body{font-family:Arial;padding:20px;font-size:12px}h1{text-align:center}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px}th{background:#eee}.assinatura{width:150px}</style></head>
<body><h1>{{ municipio }}</h1><h2>Lista de Presença — {{ acao.nome }}</h2><p>{{ gerado_em }}</p>
<table><tr><th>#</th><th>Nome</th><th>Assinatura</th></tr>
{% for i in inscritos %}<tr><td>{{ loop.index }}</td><td>{{ i.nome }}</td><td class="assinatura">&nbsp;</td></tr>{% endfor %}</table></body></html>
