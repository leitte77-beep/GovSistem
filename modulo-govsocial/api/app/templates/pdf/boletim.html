<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Boletim de Indicadores</title>
<style>body{font-family:Arial;padding:20px;font-size:12px}h1{text-align:center}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px}th{background:#eee}</style></head>
<body><h1>{{ municipio }}</h1><h2>Boletim de Indicadores</h2><p>Período: {{ data_inicio }} a {{ data_fim }}</p>
<table><tr><th>Indicador</th><th>Valor</th></tr><tr><td>Famílias Cadastradas</td><td>{{ familias }}</td></tr><tr><td>Atendimentos</td><td>{{ atendimentos }}</td></tr><tr><td>Benefícios Concedidos</td><td>{{ beneficios }}</td></tr><tr><td>Encaminhamentos</td><td>{{ encaminhamentos }}</td></tr></table><p>Gerado em: {{ gerado_em }}</p></body></html>
