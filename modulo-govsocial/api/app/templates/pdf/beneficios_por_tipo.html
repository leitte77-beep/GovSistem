<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Benefícios por Tipo</title>
<style>body{font-family:Arial;padding:20px;font-size:12px}h1{text-align:center}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:5px}th{background:#eee}</style></head>
<body><h1>{{ municipio }}</h1><h2>Benefícios Concedidos por Tipo</h2><p>Período: {{ data_inicio }} a {{ data_fim }}</p>
<table><tr><th>Tipo</th><th>Total</th><th>Valor Total</th></tr>{% for l in linhas %}<tr><td>{{ l.tipo }}</td><td>{{ l.total }}</td><td>R$ {{ "%.2f"|format(l.valor) }}</td></tr>{% endfor %}</table><p>Gerado em: {{ gerado_em }}</p></body></html>
