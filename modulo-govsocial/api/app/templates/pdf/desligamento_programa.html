<!DOCTYPE html><html lang="pt-BR">
<head><meta charset="UTF-8"><title>Desligamento de Programa</title>
<style>body{font-family:Arial;padding:30px;font-size:12px}h1,h2{text-align:center}.conteudo{line-height:1.8;margin-top:20px}</style></head>
<body><h1>{{ municipio }}</h1><h2>DESLIGAMENTO DE PROGRAMA SOCIAL</h2>

<p><strong>Data do desligamento:</strong> {{ data_desligamento }}</p><p><strong>Motivo:</strong> {{ motivo }}</p><p>{{ municipio }}, {{ gerado_em }}</p></div></body></html>
