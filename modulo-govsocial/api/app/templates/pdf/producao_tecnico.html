<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Produção Técnico</title>
<style>body{font-family:Arial;padding:20px;font-size:12px}h1{text-align:center}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:5px}th{background:#eee}</style></head>
<body><h1>{{ municipio }}</h1><h2>Produção dos Técnicos</h2><p>Período: {{ data_inicio }} a {{ data_fim }}</p>
<table><tr><th>Técnico</th><th>Atendimentos</th><th>Benefícios</th></tr>
{% for l in linhas %}<tr><td>{{ l.nome }}</td><td>{{ l.atendimentos }}</td><td>{{ l.beneficios }}</td></tr>{% endfor %}</table></body></html>
