version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: govouve
      POSTGRES_USER: govouve_user
      POSTGRES_PASSWORD: govouve_password
    ports:
      - "9832:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govouve_user -d govouve"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "9579:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9990:9000"
      - "9991:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: govouve
      POSTGRES_USER: govouve_user
      POSTGRES_PASSWORD: govouve_password
      REDIS_HOST: redis
      REDIS_DB: "3"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET: govouve
      SECRET_KEY: govouve-dev-secret-key-change-in-production
      SAAS_JWT_SECRET: change-me-in-production
      INTERNAL_API_KEY: dev-internal-key-123
      CORS_ORIGINS: '["http://localhost:7401","http://localhost:7400"]'
      DEBUG: "true"
    ports:
      - "8201:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/govouve/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:8201
    ports:
      - "7401:3000"
    depends_on:
      api:
        condition: service_healthy

  web-public:
    build:
      context: ./web-public
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "7400:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
